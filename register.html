-family: 'Newsreader';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"e7999a89-0a21-4d63-8e77-565f5b8c27ac\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Newsreader';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"8a09e008-a100-486b-8a65-61ec3b1e19ec\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Newsreader';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"528d1e4d-7b6c-4610-a7cd-815f9caf88d5\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* Inter Variable – one file covers all weights 100–900.\n   Source: https://rsms.me/inter/ (SIL Open Font License 1.1). */\n@font-face {\n  font-family: \"Inter\";\n  font-style: normal;\n  font-weight: 100 900;\n  font-display: swap;\n  src: url(\"66379b2b-e941-46fd-9cab-214ad7f5f531\") format(\"woff2-variations\"),\n       url(\"66379b2b-e941-46fd-9cab-214ad7f5f531\") format(\"woff2\");\n}\n\n:root {\n  /* ---------- Brand / accent ---------- */\n  --lt-accent:          #3B5AC8;   /* primary brand – buttons, links, active */\n  --lt-accent-hover:    #5A78D6;   /* hover on accent, focus ring */\n  --lt-accent-pressed:  #2E47A8;   /* pressed/active state on accent buttons */\n  --lt-accent-subtle:   #ECEFF9;   /* selected rows, active sidebar items */\n\n  /* ---------- Text ---------- */\n  --lt-text-primary:    #1C1917;   /* headings, body text, primary content */\n  --lt-text-secondary:  #57534E;   /* labels, helper, column headers */\n  --lt-text-tertiary:   #79716B;   /* placeholders, timestamps, meta — AA on bg-primary (~4.6:1) */\n  --lt-text-disabled:   #D6D3CD;   /* disabled buttons + inputs */\n  --lt-text-ink:        #1C1917;   /* alias – kept for compatibility */\n  --lt-text-muted:      #79716B;   /* eyebrow labels (ALL CAPS) – same as tertiary */\n  --lt-text-on-accent:  #FFFFFF;\n  --lt-text-danger:     #BF5472;\n\n  /* ---------- Surfaces ---------- */\n  --lt-bg-primary:      #FDFCFA;   /* page bg – warm off-white */\n  --lt-bg-sidebar:      #F6F4F0;   /* sidebar */\n  --lt-bg-active:       #F0EDE8;   /* selected rows, pressed states */\n  --lt-bg-hover:        #E8E4DD;   /* hovered rows */\n  --lt-bg-stone:        #F0EDE8;   /* secondary button surface, count pills */\n  --lt-bg-stone-warm:   #E8E4DD;   /* alt secondary surface */\n  --lt-bg-surface:      #FFFFFF;   /* cards, modals – pure white sits on the warm bg */\n\n  /* ---------- Borders ---------- */\n  --lt-border-default:  #E3E0DA;   /* cards, resting inputs, dividers */\n  --lt-border-input:    #D1CDC6;   /* focused/emphasized inputs */\n  --lt-border-subtle:   #F0EDE8;   /* section dividers */\n  --lt-border-warm:     #E3E0DA;   /* tab bar underline (alias) */\n\n  /* ---------- Status ---------- */\n  --lt-success:         #3A8E84;\n  --lt-success-subtle:  #ECF5F4;\n  --lt-danger:          #BF5472;\n  --lt-danger-hover:    #CC6680;   /* hover state on danger buttons */\n  --lt-danger-pressed:  #B54A64;   /* pressed/active on danger buttons */\n  --lt-danger-subtle:   #F9ECF0;\n  /* Amber/warn carries \"caveat\", \"moderate evidence\", \"some concerns\",\n   * \"mixed verdict\", \"decay\". Used by Badge.warn, TAKEAWAY_TYPES.decay /\n   * .caveat, ROB ratings, forest-plot VERDICT_TONES.mixed, and the\n   * pathway-page strength chip for \"moderate\". Three-stop scale: subtle\n   * tint for pill backgrounds, base for foreground text/icons, strong\n   * for high-contrast text on the subtle tint. */\n  --lt-warn:            #C8881F;\n  --lt-warn-strong:     #A66A1B;\n  --lt-warn-subtle:     #FAF1E1;\n\n  /* ---------- Overlays ---------- */\n  --lt-overlay-modal:   rgba(28,25,23,0.30);\n  --lt-overlay-panel:   rgba(28,25,23,0.16);\n\n  /* ---------- Radius ---------- */\n  --lt-radius-sm: 5px;\n  --lt-radius-md: 8px;\n  --lt-radius-lg: 12px;\n  --lt-radius-xl: 16px;\n  --lt-radius-full: 9999px;\n\n  /* ---------- Spacing (4px base) ---------- */\n  --lt-space-2xs: 4px;\n  --lt-space-xs:  8px;\n  --lt-space-sm:  12px;\n  --lt-space-md:  16px;\n  --lt-space-lg:  24px;\n  --lt-space-xl:  32px;\n  --lt-space-2xl: 48px;\n  --lt-space-3xl: 64px;\n\n  /* ---------- Elevation ---------- */\n  --lt-elev-1: 0 1px 2px 0 rgba(0,0,0,0.06);\n  --lt-elev-2: 0 4px 12px 0 rgba(0,0,0,0.08);\n  --lt-elev-3: 0 8px 16px 0 rgba(0,0,0,0.20); /* dropdown / menu */\n\n  /* ---------- Focus ring ---------- */\n  /* Accessible 3px halo – works on any surface, kept cool (accent) as a visual \"action\" cue */\n  --lt-focus-ring:          0 0 0 3px rgba(59, 90, 200, 0.28);\n  --lt-focus-ring-danger:   0 0 0 3px rgba(191, 84, 114, 0.28);\n  --lt-focus-ring-on-accent:0 0 0 3px rgba(255, 255, 255, 0.45); /* focus on primary button */\n\n  /* ---------- Motion ---------- */\n  /* Durations: UI should feel responsive; 120ms is the floor, 320ms the ceiling for anything meaningful */\n  --lt-dur-instant: 80ms;   /* color/opacity micro-flicks (hover tint) */\n  --lt-dur-fast:    120ms;  /* most hover / press transitions */\n  --lt-dur-base:    180ms;  /* default – buttons, menus, inputs */\n  --lt-dur-slow:    240ms;  /* modals, drawers, accordion open */\n  --lt-dur-slower:  320ms;  /* page-level transitions */\n\n  /* Easings – named by intent */\n  --lt-ease-out:    cubic-bezier(0.22, 0.61, 0.36, 1);   /* leaving → settling (default for \"enter\" motion) */\n  --lt-ease-in:     cubic-bezier(0.55, 0.06, 0.68, 0.19);/* accelerating away (for \"exit\" motion) */\n  --lt-ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);      /* symmetric – use for continuous things (progress) */\n  --lt-ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);   /* slight overshoot – use sparingly (toast in) */\n\n  /* Compound tokens for the common cases */\n  --lt-transition-colors: color var(--lt-dur-fast) var(--lt-ease-out),\n                          background-color var(--lt-dur-fast) var(--lt-ease-out),\n                          border-color var(--lt-dur-fast) var(--lt-ease-out);\n  --lt-transition-base:   all var(--lt-dur-base) var(--lt-ease-out);\n\n  /* ---------- Motion keyframes ---------- */\n  /* lt-spin – global spinner rotation. Used by Button loading state, Badge spinner,\n     and any component that shows indeterminate progress. Keeping the keyframe in\n     the token stylesheet means every consumer that loads this CSS gets it for free. */\n}\n@keyframes lt-spin { to { transform: rotate(360deg); } }\n:root {\n\n  /* ---------- Typography ---------- */\n  --lt-font-sans: \"Inter\", ui-sans-serif, system-ui, -apple-system, \"Segoe UI\", Roboto, sans-serif;\n  /* Display face — headings (review question, section + card titles). Editorial\n     serif (Newsreader) for brand recognition, matching our sister product;\n     never used for body, labels, eyebrows, numbers or data. */\n  --lt-font-display: \"Newsreader\", Georgia, \"Times New Roman\", serif;\n\n  /* Semantic text roles – sizes × weight × line-height × tracking.\n     Serif (display) is a RARE, high-impact accent: the H1 / main heading only\n     (review question, page hero, PDF cover). Everything else — section-opener\n     titles, card + panel titles, table headers, sidebar labels, and ALL numbers\n     and data — stays in the sans, so the one serif moment reads as intentional\n     and the working UI stays calm and dense. */\n  --lt-h1: 600 28px/1.12 var(--lt-font-display);\n  --lt-h2: 600 24px/1.20 var(--lt-font-sans);\n  --lt-h3: 600 20px/1.30 var(--lt-font-sans);\n  --lt-body-lg: 400 16px/1.60 var(--lt-font-sans);\n  --lt-body:    400 14px/1.55 var(--lt-font-sans); /* primary reading size — matches the app's card/panel prose (was 15; snapped so bare <p> and defaults stop diverging from inline-styled prose) */\n  --lt-body-sm: 400 12px/1.50 var(--lt-font-sans);\n  --lt-label:   500 13px/1.00 var(--lt-font-sans); /* default UI label */\n  --lt-button:  500 14px/1.00 var(--lt-font-sans);\n  --lt-table-header: 500 12px/1.50 var(--lt-font-sans); /* sentence case, letter-spacing: -0.005em */\n  --lt-overline:     500 10.5px/1.00 var(--lt-font-sans); /* letter-spacing: 0.10em; UPPERCASE */\n  --lt-badge:        500 11px/1.00 var(--lt-font-sans);\n}\n\n/* ---------- Element defaults ---------- */\nhtml, body {\n  font: var(--lt-body);\n  color: var(--lt-text-primary);\n  background: var(--lt-bg-primary);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\nh1 { font: var(--lt-h1); letter-spacing: -0.015em; color: var(--lt-text-ink); margin: 0; }\nh2 { font: var(--lt-h2); letter-spacing: -0.020em; color: var(--lt-text-primary); margin: 0; }\nh3 { font: var(--lt-h3); letter-spacing: -0.020em; color: var(--lt-text-primary); margin: 0; }\np  { font: var(--lt-body); letter-spacing: -0.010em; color: var(--lt-text-secondary); margin: 0; }\nsmall { font: var(--lt-body-sm); color: var(--lt-text-tertiary); }\ncode, kbd { font-family: ui-monospace, SFMono-Regular, \"SF Mono\", Menlo, monospace; font-size: 0.92em; }\n\n/* ---------- Keyboard shortcuts ---------- */\nkbd, .lt-kbd {\n  display: inline-flex; align-items: center; justify-content: center;\n  min-width: 18px; height: 20px; padding: 0 5px;\n  font-family: ui-monospace, SFMono-Regular, \"SF Mono\", Menlo, monospace;\n  font-size: 11px; font-weight: 500; line-height: 1;\n  color: var(--lt-text-secondary);\n  background: var(--lt-bg-surface);\n  border: 1px solid var(--lt-border-default);\n  border-bottom-width: 1.5px; /* subtle key-face illusion */\n  border-radius: 4px;\n  vertical-align: 0.05em;\n}\n.lt-kbd-group { display: inline-flex; gap: 3px; align-items: center; }\n.lt-kbd-group .sep { color: var(--lt-text-tertiary); font-size: 11px; }\n/* In dark/accent contexts */\nkbd.on-dark, .lt-kbd.on-dark { color: rgba(255,255,255,0.85); background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.24); }\n\n/* ---------- Utility classes used by preview cards ---------- */\n.lt-overline   { font: var(--lt-overline); letter-spacing: 0.10em; text-transform: uppercase; color: var(--lt-text-muted); }\n.lt-label      { font: var(--lt-label); letter-spacing: -0.010em; color: var(--lt-text-primary); }\n.lt-button-lbl { font: var(--lt-button); letter-spacing: -0.010em; }\n.lt-badge      { font: var(--lt-badge); letter-spacing: -0.010em; }\n.lt-table-h    { font: var(--lt-table-header); letter-spacing: -0.005em; color: var(--lt-text-tertiary); }\n<\u002Fstyle>\n  <style>\n    *, *::before, *::after { box-sizing: border-box; }\n    body { margin: 0; min-height: 100vh; background: var(--lt-bg-primary); color: var(--lt-text-primary); display: flex; flex-direction: column; }\n    a { color: inherit; text-decoration: none; }\n    ::selection { background: rgba(59,90,200,0.18); }\n    img, svg { display: block; }\n\n    .page { flex: 1; display: flex; align-items: center; justify-content: center; padding: 48px 24px; }\n    .card { width: 100%; max-width: 380px; }\n\n    .brand { display: flex; justify-content: center; margin-bottom: 20px; }\n    .brand img { height: 32px; width: auto; }\n\n    .head { text-align: center; margin-bottom: 28px; }\n    .head p { font: var(--lt-body); font-size: 15px; letter-spacing: -0.01em; line-height: 1.5; color: var(--lt-text-secondary); margin: 0; }\n\n    /* form-level error banner */\n    .form-error {\n      display: none; align-items: flex-start; gap: 9px; padding: 11px 13px; margin-bottom: 18px;\n      background: var(--lt-danger-subtle); border: 1px solid rgba(191,84,114,0.28); border-radius: var(--lt-radius-md);\n      font-size: 13px; line-height: 1.45; color: var(--lt-text-danger);\n    }\n    .form-error.show { display: flex; }\n    .form-error svg { width: 16px; height: 16px; flex-shrink: 0; margin-top: 1px; }\n\n    form { display: flex; flex-direction: column; gap: 16px; }\n    .field { display: flex; flex-direction: column; gap: 7px; }\n    .field label { font: var(--lt-label); letter-spacing: -0.01em; color: var(--lt-text-primary); }\n    .input-wrap { position: relative; }\n    .input {\n      width: 100%; height: 44px; padding: 0 14px; font-family: var(--lt-font-sans); font-size: 14px;\n      color: var(--lt-text-primary); background: var(--lt-bg-surface);\n      border: 1px solid var(--lt-border-default); border-radius: var(--lt-radius-md);\n      transition: var(--lt-transition-colors), box-shadow var(--lt-dur-fast) var(--lt-ease-out);\n    }\n    .input::placeholder { color: var(--lt-text-tertiary); }\n    .input:hover { border-color: var(--lt-border-input); }\n    .input:focus { outline: none; border-color: var(--lt-accent); box-shadow: var(--lt-focus-ring); }\n    .input.pw { padding-right: 44px; }\n    .field.invalid .input { border-color: var(--lt-danger); }\n    .field.invalid .input:focus { box-shadow: var(--lt-focus-ring-danger); }\n    .reveal {\n      position: absolute; top: 0; right: 0; height: 44px; width: 44px; display: flex; align-items: center; justify-content: center;\n      background: transparent; border: none; cursor: pointer; color: var(--lt-text-tertiary); transition: color var(--lt-dur-fast) var(--lt-ease-out);\n    }\n    .reveal:hover { color: var(--lt-text-secondary); }\n    .reveal svg { width: 17px; height: 17px; }\n    .err { font-size: 12px; color: var(--lt-text-danger); display: none; }\n    .field.invalid .err { display: block; }\n    /* Persistent helper line under the password field (a register affordance:\n       state the rule up front instead of only on error). Hidden once the field\n       errors, so the red message takes over without stacking two lines. */\n    .helper { font-size: 12px; color: var(--lt-text-tertiary); line-height: 1.45; }\n    .field.invalid .helper { display: none; }\n\n    .btn {\n      position: relative; display: inline-flex; align-items: center; justify-content: center; gap: 9px;\n      height: 44px; padding: 0 16px; font: var(--lt-button); font-size: 14px; letter-spacing: -0.01em;\n      border-radius: var(--lt-radius-md); border: 1px solid transparent; cursor: pointer; white-space: nowrap; width: 100%; margin-top: 4px;\n      transition: var(--lt-transition-colors), box-shadow var(--lt-dur-fast) var(--lt-ease-out);\n    }\n    .btn-primary { background: var(--lt-accent); color: var(--lt-text-on-accent); }\n    .btn-primary:hover { background: var(--lt-accent-hover); }\n    .btn-primary:active { background: var(--lt-accent-pressed); }\n    .btn-primary:focus-visible { outline: none; box-shadow: var(--lt-focus-ring); }\n    .btn .spin { display: none; width: 17px; height: 17px; border-radius: 50%; border: 2px solid currentColor; border-top-color: transparent; animation: lt-spin 0.7s linear infinite; }\n    .btn.loading { pointer-events: none; }\n    .btn.loading .lbl { display: none; }\n    .btn.loading .spin { display: block; }\n\n    .alt { font-size: 13px; color: var(--lt-text-tertiary); margin: 22px 0 0; text-align: center; }\n    .alt a { color: var(--lt-accent); font-weight: 500; }\n    .alt a:hover { color: var(--lt-accent-hover); }\n\n    /* ───── entrance ───── */\n    @media (prefers-reduced-motion: no-preference) {\n      @keyframes si-rise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }\n      .si-arm .card > * { opacity: 0; }\n      .si-ready .card > * { animation: si-rise 620ms var(--lt-ease-out) both; }\n      .si-ready .card > *:nth-child(1) { animation-delay: 40ms; }\n      .si-ready .card > *:nth-child(2) { animation-delay: 110ms; }\n      .si-ready .card > *:nth-child(3) { animation-delay: 180ms; }\n      .si-ready .card > *:nth-child(4) { animation-delay: 250ms; }\n    }\n  <\u002Fstyle>\n<\u002Fhead>\n<body>\n\n  \n\n  <main class=\"page\">\n    <div class=\"card\">\n      <a class=\"brand\" href=\"index.html\"><img src=\"4e5627fd-7ce9-4df2-b12f-1f2bbbe0da9e\" alt=\"Evidence Portal\"><\u002Fa>\n\n      <div class=\"head\">\n        <p>Create your account to start a review.<\u002Fp>\n      <\u002Fdiv>\n\n      <form id=\"register\" novalidate=\"\">\n        <div class=\"form-error\" id=\"formError\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><line x1=\"12\" y1=\"8\" x2=\"12\" y2=\"12\"><\u002Fline><line x1=\"12\" y1=\"16\" x2=\"12.01\" y2=\"16\"><\u002Fline><\u002Fsvg>\n          <span id=\"formErrorMsg\">An account with this email already exists.<\u002Fspan>\n        <\u002Fdiv>\n\n        <div class=\"field\" id=\"f-name\">\n          <label for=\"name\">Full name<\u002Flabel>\n          <div class=\"input-wrap\">\n            <input id=\"name\" name=\"name\" class=\"input\" type=\"text\" placeholder=\"Jordan Rivera\" autocomplete=\"name\">\n          <\u002Fdiv>\n          <span class=\"err\" id=\"errName\">Enter your name.<\u002Fspan>\n        <\u002Fdiv>\n\n        <div class=\"field\" id=\"f-email\">\n          <label for=\"email\">Work email<\u002Flabel>\n          <div class=\"input-wrap\">\n            <input id=\"email\" name=\"email\" class=\"input\" type=\"email\" inputmode=\"email\" placeholder=\"name@organization.org\" autocomplete=\"email\">\n          <\u002Fdiv>\n          <span class=\"err\" id=\"errEmail\">Enter a valid email address.<\u002Fspan>\n        <\u002Fdiv>\n\n        <div class=\"field\" id=\"f-pass\">\n          <label for=\"password\">Password<\u002Flabel>\n          <div class=\"input-wrap\">\n            <input id=\"password\" name=\"password\" class=\"input pw\" type=\"password\" placeholder=\"Create a password\" autocomplete=\"new-password\">\n            <button type=\"button\" class=\"reveal\" id=\"reveal\" aria-label=\"Show password\" aria-pressed=\"false\"><\u002Fbutton>\n          <\u002Fdiv>\n          <span class=\"err\" id=\"errPass\">Use at least 8 characters.<\u002Fspan>\n          <span class=\"helper\" id=\"passHelper\">Use at least 8 characters.<\u002Fspan>\n        <\u002Fdiv>\n\n        <button type=\"submit\" class=\"btn btn-primary\" id=\"submit\">\n          <span class=\"lbl\">Create account<\u002Fspan>\n          <span class=\"spin\"><\u002Fspan>\n        <\u002Fbutton>\n      <\u002Fform>\n\n      <p class=\"alt\">Already have an account? <a href=\"sign-in.html\">Sign in<\u002Fa><\u002Fp>\n    <\u002Fdiv>\n  <\u002Fmain>\n\n  <script>\n    (function () {\n      var form = document.getElementById('register');\n      var nameF = document.getElementById('f-name');\n      var emailF = document.getElementById('f-email');\n      var passF = document.getElementById('f-pass');\n      var name = document.getElementById('name');\n      var email = document.getElementById('email');\n      var pass = document.getElementById('password');\n      var formError = document.getElementById('formError');\n      var formErrorMsg = document.getElementById('formErrorMsg');\n      var submit = document.getElementById('submit');\n      var reveal = document.getElementById('reveal');\n\n      var EYE = '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z\"><\u002Fpath><circle cx=\"12\" cy=\"12\" r=\"3\"><\u002Fcircle><\u002Fsvg>';\n      var EYE_OFF = '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M9.88 9.88a3 3 0 1 0 4.24 4.24\"><\u002Fpath><path d=\"M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68\"><\u002Fpath><path d=\"M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61\"><\u002Fpath><line x1=\"2\" x2=\"22\" y1=\"2\" y2=\"22\"><\u002Fline><\u002Fsvg>';\n      reveal.innerHTML = EYE;\n\n      function validEmail(v) { return /^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/.test(v.trim()); }\n      function clearFormError() { formError.classList.remove('show'); }\n\n      reveal.addEventListener('click', function () {\n        var show = pass.type === 'password';\n        pass.type = show ? 'text' : 'password';\n        reveal.innerHTML = show ? EYE_OFF : EYE;\n        reveal.setAttribute('aria-pressed', String(show));\n        reveal.setAttribute('aria-label', show ? 'Hide password' : 'Show password');\n        pass.focus();\n      });\n\n      name.addEventListener('input', function () { nameF.classList.remove('invalid'); });\n      email.addEventListener('input', function () { emailF.classList.remove('invalid'); clearFormError(); });\n      pass.addEventListener('input', function () { passF.classList.remove('invalid'); });\n\n      form.addEventListener('submit', function (e) {\n        e.preventDefault();\n        clearFormError();\n        var ok = true;\n\n        if (!name.value.trim()) { nameF.classList.add('invalid'); ok = false; }\n        else { nameF.classList.remove('invalid'); }\n\n        if (!validEmail(email.value)) {\n          document.getElementById('errEmail').textContent = email.value.trim() ? 'Enter a valid email address.' : 'Enter your email address.';\n          emailF.classList.add('invalid'); ok = false;\n        } else { emailF.classList.remove('invalid'); }\n\n        if (pass.value.length < 8) { passF.classList.add('invalid'); ok = false; }\n        else { passF.classList.remove('invalid'); }\n\n        if (!ok) {\n          var firstBad = nameF.classList.contains('invalid') ? name\n            : emailF.classList.contains('invalid') ? email : pass;\n          firstBad.focus();\n          return;\n        }\n\n        // demo: a known address surfaces the \"already registered\" state\n        if (email.value.trim().toLowerCase() === 'taken@evidenceportal.org') {\n          formErrorMsg.textContent = 'An account with this email already exists. Sign in instead.';\n          formError.classList.add('show');\n          emailF.classList.add('invalid');\n          email.select();\n          return;\n        }\n\n        submit.classList.add('loading');\n        setTimeout(function () { window.location.href = 'new-review.html'; }, 950);\n      });\n    })();\n  <\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
